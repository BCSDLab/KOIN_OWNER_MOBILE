name: Gradle Setup

inputs:
  properties:
    required: true
    description: local.properties secret

runs:
  using: "composite"
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Create local.properties
      shell: bash
      env:
        PROPERTIES: ${{ inputs.properties }}
      run: |
        # `--decode` (long form) is portable across GNU and BSD base64; `-d` is GNU-only.
        if [ -n "$PROPERTIES" ]; then
          printf '%s' "$PROPERTIES" | tr -d '\n\r ' | base64 --decode > ./local.properties
        else
          echo "PROPERTIES secret is empty — skipping local.properties creation"
        fi

    - name: Gradle cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle/configuration-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      shell: bash
      run: chmod +x ./gradlew
