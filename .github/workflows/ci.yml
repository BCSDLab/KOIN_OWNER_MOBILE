name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  reset-review-labels:
    name: Reset Review Labels
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
    permissions:
      pull-requests: write
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Remove Review Labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const labels = ['ci:passed', 'coderabbit:complete', 'claude:complete'];
            for (const label of labels) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label
                });
              } catch (e) {
                if (e.status !== 404) {
                  throw e;
                }
              }
            }

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-setup
        with:
          properties: ${{ secrets.PROPERTIES }}

      - name: ktlint
        run: ./gradlew ktlintCheck

      - name: spotless
        run: ./gradlew spotlessCheck --no-configuration-cache

      - name: detekt
        run: ./gradlew detekt

      - name: Upload detekt Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-report
          path: '**/build/reports/detekt/**'
          retention-days: 7

      - name: Upload ktlint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ktlint-report
          path: '**/build/reports/ktlint/**'
          retention-days: 7

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-setup
        with:
          properties: ${{ secrets.PROPERTIES }}

      - name: Run JVM tests
        run: ./gradlew jvmTest

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          retention-days: 7

      - name: Upload test results (XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'
          retention-days: 7

  android-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-setup
        with:
          properties: ${{ secrets.PROPERTIES }}

      - name: Assemble Android debug APK
        run: ./gradlew :composeApp:assembleDebug

  ios-framework:
    name: iOS Framework Link
    runs-on: macos-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-setup
        with:
          properties: ${{ secrets.PROPERTIES }}

      - name: Link iOS frameworks (Arm64 + Simulator)
        run: ./gradlew :umbrella:linkDebugFrameworkIosArm64 :umbrella:linkDebugFrameworkIosSimulatorArm64

  label:
    name: Add CI Label
    needs: [ lint, test, android-build, ios-framework ]
    runs-on: ubuntu-latest
    if: needs.lint.result == 'success' && (needs.ios-framework.result == 'success' || needs.ios-framework.result == 'skipped')
    permissions:
      pull-requests: write
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Add Label
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['ci:passed']
            });
