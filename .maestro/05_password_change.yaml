appId: in.koreatech.business.dev
name: 05 - 비밀번호 변경 화면 탐색
# 전제: 로그인 상태
# 주의: 실제로 비밀번호를 변경하지 않습니다 (SMS 인증 필요)
---
- launchApp
- tapOn: "더보기"
- tapOn: "비밀번호 변경"

# 비밀번호 찾기 화면 (SMS 인증 방식) 확인
- assertVisible: "비밀번호 찾기"
- assertVisible: "010-0000-0000"

# 전화번호 입력 후 인증번호 발송 (실제 SMS 수신 불가로 여기서 중단)
# 화면 확인 후 뒤로가기
- back

# 더보기 탭 복귀 확인 (비밀번호 변경 항목이 다시 보임)
- assertVisible: "비밀번호 변경"
