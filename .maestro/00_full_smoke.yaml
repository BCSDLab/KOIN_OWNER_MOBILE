appId: in.koreatech.business.dev
name: 00 - 전체 스모크 테스트
# 매장 보유/없는 계정 + 로그인/로그아웃 양쪽 상태 모두에서 실행 가능합니다.
# 매장 보유 계정 한정 4탭 IA만 빠르게 보고 싶으면 4tab_smoke.yaml 사용.
---
- launchApp

# 이미 로그인된 경우 먼저 로그아웃
- runFlow:
    when:
      visible: "대시보드"
    commands:
      - tapOn: "더보기"
      - swipe:
          start: "50%, 70%"
          end: "50%, 20%"
      - tapOn: "로그아웃"
      - tapOn:
          id: "logout_confirm"

# Google Password Manager 다이얼로그가 노출되면 닫기
- runFlow:
    when:
      visible: "나중에"
    commands:
      - tapOn: "나중에"

# ── 1. 로그인 ─────────────────────────────────────────────
# Note: Maestro inputText는 키보드 표시 직후 첫 글자를 놓치는 race가 있어
# 첫 1글자 + 나머지로 분리해 입력한다.
- assertVisible: "사장님, 안녕하세요"
- tapOn: "010-0000-0000"
- inputText: "0"
- inputText: "1011113333"
- tapOn: "비밀번호를 입력하세요"
- inputText: "t"
- inputText: "est1234!"
- hideKeyboard
- tapOn: "로그인"

# 매장 없는 계정: InsertStore 마법사 자동 오픈 → 닫기
- runFlow:
    when:
      visible: "닫기"
    commands:
      - tapOn:
          text: "닫기"

- assertVisible: "대시보드"

# ── 2. 탭 탐색 ────────────────────────────────────────────
- tapOn: "메뉴"
- tapOn: "이벤트"

- tapOn: "더보기"
- assertVisible: "매장 정보 수정"
- assertVisible: "매장 추가 등록"
- assertVisible: "비밀번호 변경"
- assertVisible: "테마"
- assertVisible: "라이트"
- assertVisible: "다크"
- assertVisible: "시스템"
- swipe:
    start: "50%, 70%"
    end: "50%, 20%"
- assertVisible: "서비스 이용약관"
- assertVisible: "개인정보 처리방침"
- assertVisible: "오픈소스 라이선스"

- tapOn:
    text: "대시보드"
    index: 0
- assertVisible: "대시보드"

# ── 3. 매장 등록 마법사 탐색 ──────────────────────────────
- tapOn: "더보기"
- tapOn: "매장 추가 등록"
- assertVisible: "매장 등록 시작"
- tapOn: "매장 등록 시작"
- assertVisible: "다음"
- back
- assertVisible: "매장 등록 시작"
- tapOn:
    text: "닫기"
- assertVisible: "매장 추가 등록"

# ── 4. 비밀번호 변경 화면 탐색 ────────────────────────────
- tapOn: "비밀번호 변경"
- assertVisible: "비밀번호 찾기"
- back
- assertVisible: "매장 추가 등록"

# ── 5. 약관 및 정책 탐색 ──────────────────────────────────
- swipe:
    start: "50%, 70%"
    end: "50%, 20%"
- tapOn: "서비스 이용약관"
- back
- assertVisible: "더보기"

- swipe:
    start: "50%, 70%"
    end: "50%, 20%"
- tapOn: "개인정보 처리방침"
- back
- assertVisible: "더보기"

# ── 6. 로그아웃 ───────────────────────────────────────────
- swipe:
    start: "50%, 70%"
    end: "50%, 20%"
- assertVisible: "로그아웃"
- tapOn: "로그아웃"
- assertVisible: "로그아웃 하시겠습니까?"
- tapOn:
    id: "logout_confirm"
- assertVisible: "사장님, 안녕하세요"
