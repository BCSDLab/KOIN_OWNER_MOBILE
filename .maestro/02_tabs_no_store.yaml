appId: in.koreatech.business.dev
name: 02 - 4탭 탐색 (매장 없는 상태)
# 전제: 01_login.yaml 이후 대시보드에 있는 상태
---
- launchApp

# 대시보드 탭
- assertVisible: "대시보드"
- assertVisible: "등록된 매장이 없습니다."
- assertVisible: "매장 등록"

# 메뉴 탭
- tapOn: "메뉴"
- assertVisible: "메뉴"

# 이벤트 탭
- tapOn: "이벤트"

# 더보기 탭
- tapOn: "더보기"
- assertVisible: "매장 정보 수정"
- assertVisible: "매장 추가 등록"
- assertVisible: "비밀번호 변경"
- assertVisible: "테마"
- assertVisible: "라이트"
- assertVisible: "다크"
- assertVisible: "시스템"

# 대시보드로 복귀
- tapOn:
    text: "대시보드"
    index: 0
- assertVisible: "등록된 매장이 없습니다."
