appId: in.koreatech.business.dev
name: 06 - 로그아웃
# 전제: 로그인 상태
---
- launchApp
- runFlow:
    when:
      visible: "사장님, 안녕하세요"
    commands:
      - tapOn: "010-0000-0000"
      - inputText: "01011113333"
      - tapOn: "비밀번호를 입력하세요"
      - inputText: "test1234!"
      - hideKeyboard
      - tapOn: "로그인"
      - tapOn:
          text: "닫기"
- assertVisible: "대시보드"

- tapOn: "더보기"

# 스크롤하여 계정 섹션 확인
- swipe:
    start: "50%, 70%"
    end: "50%, 20%"
- assertVisible: "로그아웃"

- tapOn: "로그아웃"

# 확인 다이얼로그 노출 확인
- assertVisible: "로그아웃 하시겠습니까?"

- tapOn:
    id: "logout_confirm"

# 로그인 화면으로 복귀 확인
- extendedWaitUntil:
    visible: "사장님, 안녕하세요"
    timeout: 8000
